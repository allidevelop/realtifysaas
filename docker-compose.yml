# Локальная инфраструктура (ТЗ §14): Postgres+PostGIS и Redis.
# Приложения (web/engine) запускаются на хосте, а не в compose.

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: geo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geo_local_pass}
      POSTGRES_DB: ${POSTGRES_DB:-geo}
    ports:
      # Хост-порт 5433, чтобы не конфликтовать с локально установленным
      # PostgreSQL (служба postgresql-x64-17 занимает 5432). Внутри сети — 5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # SQL из этой папки выполняется только при первой инициализации тома.
      - ./infra/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geo} -d ${POSTGRES_DB:-geo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: geo_redis
    restart: unless-stopped
    ports:
      # Хост-порт 6380, чтобы не конфликтовать с локальным Redis/Memurai на 6379.
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
