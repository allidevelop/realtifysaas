# Локальная инфраструктура (ТЗ §14): Postgres+PostGIS и Redis.
# Приложения (web/engine) запускаются на хосте, а не в compose.

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: ${PG_CONTAINER:-geo_postgres}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geo_local_pass}
      POSTGRES_DB: ${POSTGRES_DB:-geo}
    ports:
      # Хост-порт по умолчанию 5433 (локально 5432 занят службой). На сервере —
      # переопределяется через PG_HOST_PORT (напр. 5434), чтобы развести с соседями.
      - "${PG_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # SQL из этой папки выполняется только при первой инициализации тома.
      - ./infra/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geo} -d ${POSTGRES_DB:-geo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER:-geo_redis}
    restart: unless-stopped
    ports:
      # Хост-порт по умолчанию 6380; на сервере — REDIS_HOST_PORT при необходимости.
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
