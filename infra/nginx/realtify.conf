# Nginx reverse proxy для Realtify (ТЗ §14). Заменить realtify.example.com на домен.
# Установка: симлинк в /etc/nginx/sites-enabled/, затем `certbot --nginx -d ...`.
#
# Архитектура: всё публичное → web (Next.js+Payload на :3000). engine (FastAPI :8000)
# — внутренний (web вызывает его server-side). Вебхуки /webhooks/* — это route-хендлеры
# web. Публичный API (этап 5+) при необходимости проксируется на engine отдельной
# локацией (см. ниже, закомментировано).

upstream realtify_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

# upstream realtify_engine { server 127.0.0.1:8000; keepalive 16; }

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name realtify.example.com www.realtify.example.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name realtify.example.com www.realtify.example.com;

    # SSL (Certbot заполнит/обновит пути)
    ssl_certificate     /etc/letsencrypt/live/realtify.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/realtify.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    # Безопасность
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Загрузки Media/PDF и платёжные вебхуки
    client_max_body_size 20m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Статика Next (долгий кэш)
    location /_next/static/ {
        proxy_pass http://realtify_web;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Публичный API на engine (этап 5+; раскомментировать при включении):
    # location /api/public/ {
    #     proxy_pass http://realtify_engine;
    #     include /etc/nginx/proxy_params;
    # }

    # Всё остальное → web (сайт, /admin, /account, /api Payload, /webhooks/*)
    location / {
        proxy_pass http://realtify_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
    }
}
